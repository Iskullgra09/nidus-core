version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: nidus-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-nidus_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nidus_local_secret}
      POSTGRES_DB: ${DB_NAME:-nidus_core}
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-nidus_admin} -d ${DB_NAME:-nidus_core}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nidus-fastapi
    command: fastapi dev app/main.py --host 0.0.0.0 --port 8000
    volumes:
      - ./app:/workspace/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://nidus_app_user:nidus_app_secret@db:5432/nidus_core
      - ENVIRONMENT=development
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
