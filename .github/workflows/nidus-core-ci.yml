name: Nidus Core CI

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://nidus_app_user:nidus_app_secret@localhost:5444/nidus_test
      DATABASE_ADMIN_URL: postgresql+asyncpg://nidus_admin:nidus_local_secret@localhost:5444/nidus_test
      SECRET_KEY: "super-secret-dummy-key-for-github-actions-that-is-long-enough"
      ALGORITHM: "HS256"
      APP_USER: "nidus_app_user"
      APP_PASSWORD: "nidus_app_secret"
      ADMIN_USER: "nidus_admin"
      ADMIN_PASSWORD: "nidus_local_secret"
      FRONTEND_URL: "http://localhost:3000"

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: nidus_admin
          POSTGRES_PASSWORD: nidus_local_secret
          POSTGRES_DB: nidus_test
        ports:
          - 5444:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen
        working-directory: ./backend

      - name: Create restricted DB user
        run: |
          docker exec ${{ job.services.postgres.id }} psql -U nidus_admin -d nidus_test -c "CREATE USER nidus_app_user WITH PASSWORD 'nidus_app_secret';"
          docker exec ${{ job.services.postgres.id }} psql -U nidus_admin -d nidus_test -c "GRANT ALL PRIVILEGES ON SCHEMA public TO nidus_app_user;"
          docker exec ${{ job.services.postgres.id }} psql -U nidus_admin -d nidus_test -c "GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO nidus_app_user;"
          docker exec ${{ job.services.postgres.id }} psql -U nidus_admin -d nidus_test -c "GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO nidus_app_user;"
          docker exec ${{ job.services.postgres.id }} psql -U nidus_admin -d nidus_test -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO nidus_app_user;"

      - name: Run Migrations
        run: uv run alembic upgrade head
        working-directory: ./backend

      - name: Run Tests
        run: uv run pytest -v
        working-directory: ./backend